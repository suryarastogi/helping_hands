repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: ty-check
        name: ty-check
        entry: uv run ty check src --ignore unresolved-import --ignore invalid-method-override --ignore unused-type-ignore-comment --ignore invalid-assignment --ignore call-non-callable --ignore unresolved-attribute
        language: system
        pass_filenames: false
        types_or: [python, pyi]
      - id: frontend-lint
        name: frontend-lint
        entry: npm --prefix frontend run lint
        language: system
        pass_filenames: false
      - id: frontend-typecheck
        name: frontend-typecheck
        entry: npm --prefix frontend run typecheck
        language: system
        pass_filenames: false
